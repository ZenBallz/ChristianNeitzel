<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Christian Neitzel — Editorial Portrait Photography, Vienna (preview)</title>
    <link rel="stylesheet" href="https://use.typekit.net/wkk3byr.css">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

   
    <header class="site-header" id="siteHeader" aria-hidden="true">
        <div class="site-header__wordmark">CHRISTIAN NEITZEL PHOTOGRAPHY</div>
    </header>

    <nav class="site-nav" id="siteNav" aria-hidden="true">
        <a href="#portraits" data-section="portraits">Portrait</a>
        <a href="#editorial" data-section="editorial">Event</a>
        <a href="#contact" data-section="contact">Info</a>
    </nav>

    <section class="hero" id="hero">
        <div class="hero__wordmark" id="heroWordmark">
            <h1>CHRISTIAN NEITZEL PHOTOGRAPHY</h1>
            <p class="tagline">VIENNA — WORLDWIDE</p>
        </div>
        <figure class="hero__image">
            <img
                src="../images/ChristianNeitzel_Frau-Neitzel_may26-17.jpg"
                alt="Editorial portrait"
                fetchpriority="high"
            >
        </figure>
    </section>

    <main id="portraits">
        
        <article class="frame frame--center frame--large frame--vertical"  data-shoot="tanja">
            <figure class="frame__image">
                <img
                    src="../images/ChristianNeitzel_NORA_SmokeSmoke-1.jpg"
                    alt="Nora"
                    width="801"
                    height="1200"
                    loading="lazy"
                >
            </figure>
        </article>

        <article class="frame frame--left frame--medium frame--vertical" data-shoot="anna-corridor">
            <figure class="frame__image">
                <img
                    src="../images/ChristianNeitzel__Anna_Corridor-1.jpg"
                    alt="Anna"
                     width="960"
                    height="1200"
                    loading="lazy"
                >
            </figure>
        </article>

        <article class="frame frame--center frame--medium frame--vertical" data-shoot="erroe">
            <figure class="frame__image">
                <img
                    src="../images/Erroe_25-28.jpg"
                    alt="Erroe"
                     width="800"
                    height="1200"
                    loading="lazy"
                >
            </figure>
        </article>

        <article class="frame frame--right frame--medium frame--vertical" data-shoot="anna-wu" id="editorial">
            <figure class="frame__image">
                <img
                    src="../images/ANNA_WU-37.jpg"
                    alt="Anna Wu"
                    width="800"
                    height="1200"
                    loading="lazy"
                >
            </figure>
        </article>

        <article class="frame frame--left frame--large frame--vertical" data-shoot="pauli">
            <figure class="frame__image">
                <img
                    src="../images/Pauli_Tongue_revision_color.jpg"
                    alt="Pauli"
                     width="800"
                    height="1200"
                    loading="lazy"
                >
            </figure>
        </article>
    </main>

    <footer class="site-footer" id="contact">
        <div class="site-footer__inner">
          
            <p class="site-footer__line">@christian_neitzel</p>
            <p class="site-footer__line">Vienna — Worldwide</p>
            <p class="site-footer__line">studio@christianneitzel.com</p>
    
        
        </div>
    </footer>

    <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog">
        <button class="lightbox__close" id="lightboxClose" aria-label="Close">close
        </button>
        <button class="lightbox__nav lightbox__nav--prev" id="lightboxPrev" aria-label="Previous">previous</button>
        <button class="lightbox__nav lightbox__nav--next" id="lightboxNext" aria-label="Next">next</button>
        <div class="lightbox__content">
            <img id="lightboxImg" src="" alt="">
        </div>
        <div class="lightbox__counter" id="lightboxCounter"></div>
    </div>

 <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="js/site.js"></script>
</body>
</html>
