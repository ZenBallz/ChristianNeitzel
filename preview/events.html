<button class="menu-trigger" id="menuTrigger" aria-label="Open menu" aria-expanded="false">

    <section class="hero" id="hero">
        <div class="hero__wordmark" id="heroWordmark">
            <h1>AMAZE PICS FOR AMAZE EVENTS</h1>
            <p class="tagline">VIENNA — WORLDWIDE</p>
        </div>
      <figure class="hero__image" id="heroSlideshow">
    <img class="hero__slide is-active" src="../images/events/magika-1stofmay/christianneitzel_magika-drahthaus-1stofmay-8.jpg" alt="" fetchpriority="high">
    <img class="hero__slide" src="../images/events/barbasso/christianneitzel_barbasso-7.jpg" alt="" loading="lazy">
    <img class="hero__slide" src="../images/events/mochi/christianneitzel_mochi-1.jpg" alt="" loading="lazy">
    <img class="hero__slide" src="../images/events/rosispezial/rosispezial-chelsea/christianneitzel_rosispezial_chelsea-3.jpg" alt="" loading="lazy">
    <img class="hero__slide" src="../images/events/rosispezial/rosispezial-schmauswaberl/christianneitzel_rosispezial_schmauswaberl-3.jpg" alt="" loading="lazy">
</figure>
    </section>

    <main id="events">
        <article class="frame frame--center frame--medium frame--vertical" data-shoot="magika-1stofmay">
            <figure class="frame__image">
                <img src="../images/events/magika-1stofmay/christianneitzel_magika-drahthaus-1stofmay-16.jpg"
                     alt="Magika — Drahthaus, 1st of May" loading="lazy">
            </figure>
        </article>

        <article class="frame frame--pair" data-shoot="barbasso">
            <figure class="frame__image">
                <img src="../images/events/barbasso/christianneitzel_barbasso-11.jpg"
                     alt="Bar Basso" loading="lazy">
            </figure>
            <figure class="frame__image">
                <img src="../images/events/barbasso/christianneitzel_barbasso-14.jpg"
                     alt="Bar Basso" loading="lazy">
            </figure>
        </article>

        <article class="frame frame--left frame--medium frame--vertical" data-shoot="mochi">
            <figure class="frame__image">
                <img src="../images/events/mochi/christianneitzel_mochi-1.jpg"
                     alt="Mochi Bar" loading="lazy">
            </figure>
        </article>
<article class="frame frame--right frame--medium frame--vertical" data-shoot="vernissage-bisspuren">
    <figure class="frame__image">
        <img src="../images/events/bisspurendesmenschseins/christianneitzel_vernissage-bisspurendesmenschseins-2.jpg"
             alt="Vernissage — Bissspuren des Menschseins" loading="lazy">
    </figure>
</article>

          <article class="frame frame--right frame--medium frame--vertical" data-shoot="rosispezial-schmauswaberl">
            <figure class="frame__image">
                <img src="../images/events/rosispezial/rosispezial-schmauswaberl/christianneitzel_rosispezial_schmauswaberl-4.jpg"
                     alt="Rosi Spezial @ Schmauswaberl" loading="lazy">
            </figure>
        </article>
        <article class="frame frame--center frame--medium frame--vertical" data-shoot="rosispezial-chelsea">
            <figure class="frame__image">
                <img src="../images/events/rosispezial/rosispezial-chelsea/christianneitzel_rosispezial_chelsea-1.jpg"
                     alt="Rosi Spezial @ Chelsea" loading="lazy">
            </figure>
        </article>

      
    </main>

    <footer class="site-footer" id="contact">

            <div class="site-footer__line"> <a href="mailto:studio@christianneitzel.com">studio@christianneitzel.com</a></div>
